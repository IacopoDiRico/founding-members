<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <!-- OUTER RING — this group will spin -->
  <g id="ring">
    <circle cx="120" cy="120" r="112" stroke="#8B5E3C" stroke-width="2"/>
    <circle cx="120" cy="120" r="98" stroke="#8B5E3C" stroke-width="1" stroke-dasharray="4 5" opacity="0.5"/>
    <path id="topArc240" d="M 22,120 A 98,98 0 0,1 218,120" fill="none"/>
    <path id="botArc240" d="M 22,120 A 98,98 0 0,0 218,120" fill="none"/>
    <text font-family="'DM Mono',monospace" font-size="13" fill="#8B5E3C" letter-spacing="5">
      <textPath href="#topArc240" startOffset="9%">FOUNDING · MEMBERS</textPath>
    </text>
    <text font-family="'DM Mono',monospace" font-size="11" fill="#8B5E3C" letter-spacing="4" opacity="0.7">
      <textPath href="#botArc240" startOffset="16%">EST · MMXXVI · LONDON</textPath>
    </text>
    <circle cx="120" cy="8" r="3" fill="#8B5E3C"/>
    <circle cx="120" cy="232" r="3" fill="#8B5E3C"/>
    <circle cx="8" cy="120" r="3" fill="#8B5E3C"/>
    <circle cx="232" cy="120" r="3" fill="#8B5E3C"/>
  </g>

  <!-- FM LETTERS — this group stays fixed, no transform ever touches it -->
  <g id="letters">
    <line x1="72" y1="78" x2="72" y2="154" stroke="#232018" stroke-width="5" stroke-linecap="round"/>
    <line x1="72" y1="78" x2="104" y2="78" stroke="#232018" stroke-width="5" stroke-linecap="round"/>
    <line x1="72" y1="113" x2="97" y2="113" stroke="#232018" stroke-width="5" stroke-linecap="round"/>
    <line x1="116" y1="154" x2="116" y2="78" stroke="#232018" stroke-width="5" stroke-linecap="round"/>
    <line x1="116" y1="78" x2="138" y2="118" stroke="#232018" stroke-width="5" stroke-linecap="round"/>
    <line x1="138" y1="118" x2="160" y2="78" stroke="#232018" stroke-width="5" stroke-linecap="round"/>
    <line x1="160" y1="78" x2="160" y2="154" stroke="#232018" stroke-width="5" stroke-linecap="round"/>
